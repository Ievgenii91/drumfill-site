name: deploy-pages

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-pages.yml"
      - ".nojekyll"
      - "CNAME"
      - "*.html"
      - "*.js"
      - "fills/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Stage site
        run: |
          rm -rf _site
          mkdir -p _site
          shopt -s nullglob
          files=( *.html *.js .nojekyll CNAME )
          if ((${#files[@]})); then
            cp -- "${files[@]}" _site/
          fi
          if [ -d fills ]; then
            cp -R fills _site/
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
